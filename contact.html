<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact — Dylan Ottinger</title>
    <meta name="description" content="Get in touch with Dylan Ottinger.">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="page">
      <header class="block">
        <h1><a href="/" class="home-link">Dylan Ottinger</a></h1>
        <nav class="site-nav">
          <a href="/">Home</a> /
          <a href="/contact.html">Contact</a>
        </nav>
      </header>

      <section class="block" aria-labelledby="contact-heading">
        <h2 id="contact-heading">Contact</h2>
        <p>Fill out the form below and I'll get back to you by email.</p>

        <form class="contact-form" action="https://formspree.io/f/xnjynjro" method="POST">
          <div class="form-row">
            <div class="form-group">
              <label for="first-name">First name</label>
              <input type="text" id="first-name" name="first_name" required>
            </div>
            <div class="form-group">
              <label for="last-name">Last name</label>
              <input type="text" id="last-name" name="last_name" required>
            </div>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
          </div>

          <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" required>
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="6" required></textarea>
          </div>

          <button type="submit">Send message</button>
        </form>
      </section>

      <footer class="block">
        <p>© 2026 Dylan Ottinger</p>
      </footer>
    </main>
  </body>
</html>
